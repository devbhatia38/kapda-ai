name: kapda_ai
description: Virtual Try-On for Indian Traditional Wear.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.0
  provider: ^6.1.2
  image_picker: ^1.1.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1
  google_sign_in: ^6.2.1
  flutter_otp_text_field: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mannequin.png
